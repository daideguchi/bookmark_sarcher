<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        width: 300px;
        min-height: 360px;
        margin: 0;
        padding: 14px;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
        color: #202124;
      }
      input {
        width: 100%;
        padding: 8px 10px;
        margin: 6px 0 12px;
        box-sizing: border-box;
        border: 1px solid #dadce0;
        border-radius: 6px;
      }
      ul {
        padding: 0;
        margin: 0;
      }
      li {
        list-style-type: none;
        margin-bottom: 8px;
        border-bottom: 1px solid #ccc;
        padding-bottom: 8px;
      }
      a {
        text-decoration: none;
        color: #1a0dab;
        word-break: break-word;
      }
      .empty {
        color: #5f6368;
        line-height: 1.45;
      }
      .url {
        display: block;
        margin-top: 3px;
        color: #5f6368;
        font-size: 11px;
      }
    </style>
  </head>
  <body>
    <strong>ブックマーク検索</strong>
    <input type="text" id="searchInput" placeholder="ブックマークを検索します..." />
    <ul id="results">
      <li class="empty">検索語を入力すると、保存済みブックマークだけを端末内で検索します。</li>
    </ul>
    <script src="popup.js"></script>
  </body>
</html>
